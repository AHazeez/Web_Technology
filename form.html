<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form of the webtechnology</title>
    <style>
        body{
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
        }
        form{
            background-color: #fff;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            max-width: 400px;
            margin: 50px auto;
            align-items: center;

        }
        #helloo{
            color: #333;
            text-align: center;
        }
        #submit, #reset{
            background-color: #007BFF;
            color: white;
            border: none;
            padding: 10px 20px;
            margin: 5px;
            border-radius: 5px;
            cursor: pointer;
            align-items: center;
        }
    </style>
</head>
<body>
    <form action="./marquee.html" method="get">
        <fieldset>
            <legend id="helloo">Contact Form</legend>
            <label for="name">Name:</label>
            <input type="text" id="name" name="name"><br><br>
            
            <label for="email">Email:</label>
            <input type="email" id="email" name="email"><br><br>
            
            
            <input id="submit" type="submit" value="Submit">
            <button id="reset" type="reset">Reset</button>
        </fieldset>
    </form>
    
</body>
</html>
