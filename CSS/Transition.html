<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transition</title>
    <style>
   @keyframes changeBox {
            0% {
                background-color: aqua;
                transform: scale(1);
            }
            50% {
                background-color: blue;
                transform: scale(1.5);
            }
            100% {
                background-color: aqua;
                transform: scale(1);
            }
        }
        div{
            width:100px;
            height:100px;
            border:1px solid;
            background-color: aqua;
            transition:all 5s linear;
            animation: changeBox 3s linear infinite;
        }
   
    </style>
</head>
<body>
    <div id="main">
     
    </div>
    
</body>
</html>
