<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;

            /* Centering */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;

            /* Background */
            background: linear-gradient(135deg, #91f715f5 0%, hsla(253, 37%, 46%, 0.757) 100%);
        }

        .login-container {
            display: flex;
            flex-direction: column;
            align-items: center;

            width: 300px;
            padding: 20px;

            border-radius: 20px;
            background-color: rgba(80, 0, 254, 0.8);
            box-shadow: 0px 10px 20px rgba(0, 0, 0, 0.3);

            transition: transform 0.3s ease;
        }

        .login-container:hover {
            transform: scale(1.03);
        }

        h1 {
            color: white;
            margin-bottom: 20px;
        }

        form {
            display: flex;
            flex-direction: column;
            width: 100%;
        }

        label {
            color: white;
            margin-top: 10px;
            font-size: 14px;
        }

        input {
            padding: 10px;
            font-size: 16px;
            margin-top: 5px;
            border: none;
            border-radius: 5px;
        }

        input:focus {
            outline: none;
            box-shadow: 0 0 5px cyan;
        }

        input[type="submit"] {
            margin-top: 20px;
            background-color: aqua;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        input[type="submit"]:hover {
            background-color: #00d4d4;
        }
    </style>
</head>

<body>
    <div class="login-container">
        <h1>Login Form</h1>

        <form action="#" method="post">
            <label for="username">Username</label>
            <input 
                type="text" 
                id="username" 
                name="username" 
                placeholder="Enter your name" 
                required
            >

            <label for="password">Password</label>
            <input 
                type="password" 
                id="password" 
                name="password" 
                placeholder="Enter your password" 
                required
            >

            <input type="submit" value="Login">
        </form>
    </div>
</body>
</html>
