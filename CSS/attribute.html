<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Animated Form</title>

<style>
/* Smooth animated background */
body {
    margin: 0;
    padding: 0;
    font-family: Arial, sans-serif;
    animation: bgAnimation 8s infinite alternate;
}

/* Background animation */
@keyframes bgAnimation {
    0%   { background-color: #ff9a9e; }
    25%  { background-color: #a18cd1; }
    50%  { background-color: #fbc2eb; }
    75%  { background-color: #84fab0; }
    100% { background-color: #ff9a9e; }
}

/* Center container */
section#cash1 {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Form box */
.form-box {
    background: white;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 0 15px rgba(0,0,0,0.2);
    display: flex;
    flex-direction: column;
    gap: 15px;
}

/* Input styling */
input {
    padding: 10px;
    border-radius: 6px;
    border: 2px solid #ccc;
    outline: none;
    transition: 0.3s;
}

/* Placeholder shown effect */
input:placeholder-shown {
    background-color: lightyellow;
}

/* Focus effect */
input:focus {
    border-color: blue;
    background-color: #eef;
}

/* Button */
button {
    padding: 10px;
    border: none;
    border-radius: 6px;
    background-color: black;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background-color: #333;
}
#cash3{
    background-color: rgba(20, 0, 10, 0.767);
}
</style>

</head>

<body>

<section id="cash1">
    <div class="form-box">
        <input type="text" placeholder="Enter your name">
        <input type="number" placeholder="Enter your age">
        <button type="submit">Submit</button>
    </div>
</section>
<section id="cash2">
    <div class="form-box">
        <input type="email" placeholder="Enter your email">
        <input type="password" placeholder="Enter your password">
        <button type="submit">Login</button>
    </div>
    <section id="cash3">

        </section>


    <nav>
       <div class="nav-container"
    </nav>
</section>
</body>
</html>
