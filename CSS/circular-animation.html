<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Newone</title>
    <style>
        body{
            display:flex;
            justify-content: center;
            gap:20px;
            align-items: center;
        }
        @keyframes make{
            0%{
                transform: translate(100px 100px);

            }
            50%{
                      transform: translate(100px 100px);

            }
            100%{
                      transform: translate(100px 100px);
                      background-color: black;

            }
            

        }
        div{
            width:200px;
            height:200px;
            border-radius: 50%;
            border: 1px solid;
            display: flex;
            animation: make 2s linear infinite;
        }
    </style>
</head>

<body>
    <div id=""></div>
    <div id=""></div>
    <div id=""></div>
    <div id=""></div>
    
</body>
</html>
