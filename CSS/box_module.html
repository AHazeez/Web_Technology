<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box_module</title>
    <style>

        @keyframes r {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        @keyframes c{
                  0% { background-color: black; }
                 50% { background-color: rgb(0, 17, 128);  }
                 
        }
       
        h1{
    
            padding-right: 10px;
            margin: 100px;
            width: 100px;
            animation: r 2s linear infinite, c 2s infinite;
            height: 100px;
            text-align: center;
            padding:10px 20px 10px 20px;
            border: 5px solid #000;
            border-radius: 50%;
            background-color: lightblue;
            box-shadow: 0px 5px 15px rgba(0,0,0,0.3);
        } 
        div{
            display: flex;
            flex-direction: column;
            align-items: center;

        }  
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: lightgreen;
            border: none;
            border-radius: 5px;
            box-shadow: 0px 5px 15px rgba(0,0,0,0.3);
            transition: background-color 0.3s ease, transform 0.3s ease;
        }
    </style>
</head>
<body>
    <div>
    <h1>Box Module</h1>
    <button onclick="window.location.href='https://www.w3schools.com/css/css_boxmodel.asp'">
    Click here for more information
</button>
    </div>
</body>
</html>
