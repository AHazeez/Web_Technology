<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box_module</title>
    <style>

        @keyframes r {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        @keyframes c{
                  0% { background-color: black; }
                 50% { background-color: rgb(0, 17, 128);  }
                 
        }
          body {
            background-color: black;

          }
        h1{
    
            padding-right: 10px;
            margin: 100px;
            width: 100px;
            animation: r 2s linear infinite, c 2s infinite;
            height: 100px;
            text-align: center;
            padding:20px 20px 20px 20px;
            border: 5px solid #000;
            border-radius: 200px 200px 200px 200px ;
            background-color: lightblue;
            box-shadow: 0px 20px 20px rgba(236, 92, 171, 0.642);
        } 
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: yellow;
            align-content: center;
            width: 400px;
            height:300px
            border-radius: 20px;
            box-shadow: 0px 10px 20px rgba(0,0,0,0.3);
            margin: 0 auto;
            margin-top: 150px;
        } 
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: lightgreen;
            border: none;
            border-radius: 50px;
            box-shadow: 0px 5px 15px rgba(0,0,0,0.3);
            transition: background-color 0.3s ease, transform 0.3s ease;
        }
    </style>
</head>
<body>
    <div class="container">
    <h1>Box Module</h1>
    <button onclick="window.location.href='https://www.w3schools.com/css/css_boxmodel.asp'">
    Click here for more information
</button>
    </div>
</body>
</html>
