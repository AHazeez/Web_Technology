<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Card</title>
    <link rel="stylesheet" href="index1.css">
</head>
<body>

<header>
    <nav>
        <div id="logo-container">
            <img src="https://png.pngitem.com/pimgs/s/71-710906_transparent-michael-jackson-png-michael-jackson-dance-pose.png" alt="logo">
            <span>Moon<b>Walk</b></span>
        </div>

        <div id="search-container">
            <input type="text" placeholder="Search...">
        </div>

        <div id="menu-container">
            <a href="">Dashboard</a>
            <a href="">Collections</a>
            <a href="">Brands</a>
        </div>
    </nav>
</header>

<main id="main-container">
    <div class="product-card">

        <section class="img-container">
            <img src="https://images.pexels.com/photos/57421/running-shoe-shoe-asics-highly-functional-57421.jpeg" alt="shoe">
        </section>

        <section class="info-container">
            <h5>Nike Shoe</h5>
            <button>Buy Now</button>
        </section>
         
    </div>
</main>
</body>
</html>
