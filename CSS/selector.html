<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sector in css</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body{       
            background-color: black;
            text-align: center;
        }
        .Hashing1, .Hashing2, .Hashing3{
            background-color: rgb(12, 0, 79);
            align-self: center;
            
        }

        h1{
            color: aqua;
            background-color: rgb(37, 37, 163);
        }
        #myHeading{
            background-color: rgb(247, 49, 0);
        }
        .myClass{
            color: lightgray;
        }
        .Hashing1{
            color: lightblue;
            height: 200px;
            width: 200px;
        }
        .Hashing2{
            color: lightblue;
            height: 200px;
            width: 200px;
        }
        .Hashing3{
            color: lightblue;
            height: 200px;
            width: 200px;
            container-type: center;
        }
        #para{
            color: white;
            background-color: rgb(0, 0, 0);
            height: 100px;
            width: 200px;
            margin: 20px auto;
            overflow: auto;
        }
    </style>
</head>
<body>
    <!-- simple selector-->
     <h1> Hello world this is Abdul Hazeez</h1>
     <!-- id selector-->
     <h1 id="myHeading">This is a heading with an ID</h1>
        <!-- class selector-->  
        <h1 class="myClass">This is a heading with a class</h1>
        <div class="container" ></div>
        <section class="container" >

        </section> 
        <!-- group selector-->
        <h1 class="myClass">This is another heading with the same class</h1>
        <section class="Hashing1"> Hello  container </section>
        <br><br>
        <section class="Hashing2"> Hello  normal peopels </section><br><br>
        <section class="Hashing3"> Hello hero of the class </section><br>

        <div id="para">heroo </div>

</body>
</html>
